<!DOCTYPE html>
<html lang="en" xml:lang="en"> 
<head>
<title>Overview</title>
<meta charset="UTF-8" />

<style>
.tg  {
	border-collapse:collapse;
	border-spacing:0;
	width:100%;
	min-width:600px;
	height:100%;
	color:darkslategray;
	}
	
.tg th{
	min-width:325px;
	width:325px;
	height:20px;
	font-size:18px;
	text-align:left;
	font-weight:bold;
	padding:5px 10px 5px 10px;
	overflow:hidden;
	word-break:normal;
	background-color:lightgrey;
	}

.tg td{
	font-size:15px;
	padding:5px 10px 5px 10px;
	overflow:hidden;
	word-break:normal;
	}

.tg .tg-1{
	font-size:15px;
	vertical-align: top;
	font-family:Arial, Helvetica, sans-serif !important;
	}

.tg .tg-2{
	height:52px;
	font-size:15px;
	padding:3px 0px 3px 10px;
	vertical-align:middle;
	font-family:Arial, Helvetica, sans-serif !important;
	}

.tg .tg-3{
	height:45px;
	font-size:15px;
	padding:3px 10px 3px 10px;
	vertical-align:middle;
	font-family:Arial, Helvetica, sans-serif !important;
	}

.tg .tg-4{
	height:fit-content;
	font-size:15px;
	padding:5px 10px 5px 10px;
	vertical-align:text-top;
	font-family:Arial, Helvetica, sans-serif !important;
	}
</style>

</head>

<body style="font-family: arial">

	<table class="tg">
		<tr>
			<th class="th">Value</th>
			<td class="tg-1" rowspan="13">
				<img style="padding-left: 5px; padding-top: 0px; max-width:100%; width:100%; height:auto;" id="img" src="">
			</td>
		</tr>	 
		<tr>	
			<td class="tg-2">
				<div id="value"></div>
			</td>	
		</tr>
		<tr>
			<th class="th">Previous Value</th>
		</tr>	
		<tr>	
			<td class="tg-2">
				<div id="prevalue"></div>
			</td>	
		</tr>
		<tr>
			<th class="th">Raw Value</th>
		</tr>	
		<tr>	
			<td class="tg-2">
				<div id="raw"></div>
			</td>	
		</tr>
		<tr>
			<th class="th">Value Status</th>
		</tr>	
		<tr>	
			<td class="tg-2">
				<div id="error"></div>
			</td>	
		</tr>
		<tr>
			<th class="th">Process State</th>
		</tr>	
		<tr>	
			<td class="tg-3">
				<div id="statusflow" ></div>
			</td>
		</tr>  
		<tr>
			<th class="th">System Info</th>
		</tr>	
		<tr>	
			<td class="tg-4">
				<div id="sntp_date" ></div>
				<div id="timestamp" ></div>	
				<div id="cputemp" ></div>
				<div id="rssi" ></div>
				<div id="battery_row" style="display:none;">
					<span id="battery_icon" style="display:inline-block; width:1.6em; text-align:center;"></span>
					<span id="battery_text"></span>
				</div>
				<div id="stay_awake_row" style="display:none;">
					<span id="stay_awake_text"></span>
					<button id="stay_awake_btn" type="button" onclick="toggleStayAwake()" style="margin-left:6px;">toggle</button>
				</div>
				<div>
					<span id="uptime" ></span>
					<span id="round" ></span>
				</div>
			</td>
		</tr>
	</table>

	<script type="text/javascript" src="jquery-3.6.0.min.js?v=$COMMIT_HASH"></script>
	<script type="text/javascript" src="common.js?v=$COMMIT_HASH"></script> 
	<script type="text/javascript" src="readconfigcommon.js?v=$COMMIT_HASH"></script>
	<script type="text/javascript" src="readconfigparam.js?v=$COMMIT_HASH"></script>
	
	<script type="text/javascript">
		function addZero(i) {
			if (i < 10) {
				i = "0" + i;
			}
			return i;
		}

		$(document).ready(function() {
			LoadData();
			LoadROIImage();
		});

		function LoadData(){
			loadValue("value", "value", "border-collapse: collapse; width: 100%");
			loadValue("raw", "raw", "border-collapse: collapse; width: 100%");
			loadValue("prevalue", "prevalue", "border-collapse: collapse; width: 100%");
			loadValue("error", "error", "border-collapse: collapse; width: 100%");
			loadStatus();
			loadSntpDate();
			loadCPUTemp();
			loadRSSI();
			loadUptime();
			loadRoundCounter();
			loadBattery();
			loadStayAwake();
		}

		function LoadROIImage(){
			var d = new Date();
			var timestamp = d.getTime();
			var h = addZero(d.getHours());
			var m = addZero(d.getMinutes());
			var s = addZero(d.getSeconds());
			document.getElementById("img").src = getDomainname() + '/img_tmp/alg_roi.jpg?timestamp=' + timestamp;
			$('#timestamp').html("Last Page Refresh:" + (h + ":" + m + ":" + s));
		}

		function Refresh() {
			setTimeout (function() {
				LoadData();
				LoadROIImage();
				Refresh();
			}, 300000);
		}

		function loadStatus() {
			url = domainname + '/statusflow';     
			var xhttp = new XMLHttpRequest();
			xhttp.onreadystatechange = function() {
				if (this.readyState == 4 && this.status == 200) {
					var _rsp = xhttp.responseText;
					$('#statusflow').html(_rsp);
				}
			}
			
			xhttp.open("GET", url, true);
			xhttp.send();
		}

		function loadCPUTemp() {
			url = domainname + '/cpu_temperature';     
			var xhttp = new XMLHttpRequest();
			xhttp.onreadystatechange = function() {
				if (this.readyState == 4 && this.status == 200) {
					var _rsp = xhttp.responseText;
					$('#cputemp').html("CPU Temperature: " +_rsp + "°C");
				}
			}
			
			xhttp.open("GET", url, true);
			xhttp.send();
		}

		function loadRSSI() {
			url = domainname + '/rssi';     
			var xhttp = new XMLHttpRequest();
			xhttp.onreadystatechange = function() {
				if (this.readyState == 4 && this.status == 200) {
					var _rsp = xhttp.responseText;
				
					if (_rsp >= -55) {
						$('#rssi').html("WIFI Signal: Excellent (" + _rsp + "dBm)");
					}
					else if (_rsp < -55 && _rsp >= -67) {
						$('#rssi').html("WIFI Signal: Good (" + _rsp + "dBm)");
					}
					else if (_rsp < -67 && _rsp >= -78) {
						$('#rssi').html("WIFI Signal: Fair (" + _rsp + "dBm)");
					}
					else if (_rsp < -78 && _rsp >= -85) {
						$('#rssi').html("WIFI Signal: Weak (" + _rsp + "dBm)");
					}
					else {
						$('#rssi').html("WIFI Signal: Unreliable (" + _rsp + "dBm)");
					}
				}
			}
			
			xhttp.open("GET", url, true);
			xhttp.send();		
		}

		function loadSntpDate() {
			url = domainname + '/date';
			var xhttp = new XMLHttpRequest();
			xhttp.onreadystatechange = function () {
				if (this.readyState == 4 && this.status == 200) {
					var _rsp = xhttp.responseText;
					$('#sntp_date').html("Date/Time on device: " + _rsp);
				}
			}

			xhttp.open("GET", url, true);
			xhttp.send();
		}

		function loadUptime() {
			url = domainname + '/uptime';     
			var xhttp = new XMLHttpRequest();
			xhttp.onreadystatechange = function() {
				if (this.readyState == 4 && this.status == 200) {
					var _rsp = xhttp.responseText;
					$('#uptime').html("Uptime: " + _rsp);
				}
			}
			
			xhttp.open("GET", url, true);
			xhttp.send();
		}

		function loadRoundCounter() {
			url = domainname + '/info?type=Round';
			var xhttp = new XMLHttpRequest();
			xhttp.onreadystatechange = function() {
				if (this.readyState == 4 && this.status == 200) {
					var _rsp = xhttp.responseText;
					$('#round').html("(Round: " + _rsp + ")");
				}
			}

			xhttp.open("GET", url, true);
			xhttp.send();
		}

		function batteryIcon(pct) {
			// Unicode block sequence for a battery icon -- works without any extra font.
			// One of 5 fill levels, recoloured red when low.
			var glyph;
			if (pct >= 87) glyph = "\u{1F50B}";      // full battery
			else if (pct >= 62) glyph = "\u{1F50B}"; // 3/4
			else if (pct >= 37) glyph = "\u{1FAAB}"; // half
			else if (pct >= 15) glyph = "\u{1FAAB}"; // 1/4
			else glyph = "\u{1FAAB}";                // empty
			var color = (pct < 15) ? "#cc0000" : (pct < 30 ? "#cc7700" : "inherit");
			return '<span style="color:' + color + '; font-size:1.1em;">' + glyph + '</span>';
		}

		function loadBattery() {
			// First probe whether battery monitoring is enabled on the device.
			// On non-aleksei boards (or aleksei without Battery.Enabled) this
			// returns "false" and the row stays hidden.
			var xprobe = new XMLHttpRequest();
			xprobe.onreadystatechange = function() {
				if (this.readyState == 4 && this.status == 200) {
					if (xprobe.responseText.trim() !== "true") {
						document.getElementById("battery_row").style.display = "none";
						return;
					}
					document.getElementById("battery_row").style.display = "";

					var xv = new XMLHttpRequest();
					xv.onreadystatechange = function() {
						if (this.readyState == 4 && this.status == 200) {
							var v = xv.responseText.trim();
							var xp = new XMLHttpRequest();
							xp.onreadystatechange = function() {
								if (this.readyState == 4 && this.status == 200) {
									var p = parseInt(xp.responseText.trim(), 10);
									if (isNaN(p)) {
										$("#battery_icon").html("");
										$("#battery_text").html("Battery: n/a");
									} else {
										$("#battery_icon").html(batteryIcon(p));
										$("#battery_text").html("Battery: " + p + "% (" + v + " V)");
									}
								}
							}
							xp.open("GET", domainname + "/info?type=BatteryPercent", true);
							xp.send();
						}
					}
					xv.open("GET", domainname + "/info?type=BatteryVoltage", true);
					xv.send();
				}
			}
			xprobe.open("GET", domainname + "/info?type=BatteryEnabled", true);
			xprobe.send();
		}

		function renderStayAwake(on) {
			document.getElementById("stay_awake_row").style.display = "";
			$("#stay_awake_text").html("Stay Awake: <strong style=\"color:" + (on ? "#cc7700" : "inherit") + "\">" + (on ? "ON (sleep disabled)" : "off (normal sleep)") + "</strong>");
			document.getElementById("stay_awake_btn").textContent = on ? "Resume sleep" : "Stay awake";
		}

		function loadStayAwake() {
			// Always shown -- this is the user's manual override for SleepWhileIdle.
			// Useful even when SleepWhileIdle=false: a known harmless toggle.
			var xhttp = new XMLHttpRequest();
			xhttp.onreadystatechange = function() {
				if (this.readyState == 4 && this.status == 200) {
					renderStayAwake(xhttp.responseText.trim() === "true");
				}
			}
			xhttp.open("GET", domainname + "/info?type=StayAwake", true);
			xhttp.send();
		}

		function toggleStayAwake() {
			// No value query -> server toggles the current state.
			var xhttp = new XMLHttpRequest();
			xhttp.onreadystatechange = function() {
				if (this.readyState == 4 && this.status == 200) {
					var on = xhttp.responseText.trim() === "true";
					renderStayAwake(on);
					firework.launch("Stay-Awake override " + (on ? "enabled - device will not deep sleep" : "cleared - normal sleep will resume next round"), on ? 'warning' : 'success', 5000);
				}
			}
			xhttp.open("GET", domainname + "/sleep_override", true);
			xhttp.send();
		}

		function loadValue(_type, _div, _style) {
			url = domainname + '/value?all=true&type=' + _type;     
			var xhttp = new XMLHttpRequest();
			xhttp.onreadystatechange = function() {
				if (this.readyState == 4 && this.status == 200) {
					var _rsp = xhttp.responseText;
					var _split = _rsp.split("\r");
					
					if (typeof _style == undefined) {
						out = "<table>";
					}
					else {
						out = "<table style=\"" + _style + "\">";
					}

					if (_split.length == 1) {
						var _zer = ZerlegeZeile(_split[0], "\t")
					
						if (_zer.length > 1) {
							out = _zer[1];
						}
						else {
							out = "";
						}
					}
					else {
						for (var j = 0; j < _split.length; ++j) {
							var _zer = ZerlegeZeile(_split[j], "\t")
						
							if (_zer.length == 1) {
								out = out + "<tr><td style=\"width: 22%; padding: 3px 5px; text-align: left; vertical-align:middle; border: 1px solid lightgrey\">" + 
								_zer[0] + "</td><td style=\"padding: 3px 5px; text-align: left; vertical-align:middle; border: 1px solid lightgrey\"> </td></tr>"; 
							}
							else {
								out = out + "<tr><td style=\"width: 22%; padding: 3px 5px; text-align: left; vertical-align:middle; border: 1px solid lightgrey\">" + 
								_zer[0] + "</td><td style=\"padding: 3px 5px; text-align: left; vertical-align:middle; border: 1px solid lightgrey\" >" + _zer[1] + "</td></tr>";
							}
						}
						out = out + "</table>"
					}
				document.getElementById(_div).innerHTML = out;
				}
			};
			
			xhttp.open("GET", url, true);
			xhttp.send();		
		}

		/* 
		function setImageMaxWidth() {
			loadConfig(domainname); 
			ParseConfig();
			param = getConfigParameters();
			
			if(param["TakeImage"]["CamFrameSize"].value == "QVGA") {
				document.getElementById("img").style.maxWidth = "320px";
			}
			else {
				document.getElementById("img").style.maxWidth = "640px";
			}
		}
		*/
		function init(){
			domainname = getDomainname();
			// setImageMaxWidth(); // CamFrameSize was replaced by zoom - CamFrameSize is no longer needed/used for zoom 
			Refresh();
		}

		init();

	</script>
</body>
</html>
